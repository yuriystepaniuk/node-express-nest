services:
  database-mongobg:
    image: mongo:latest
    container_name: database-mongobg
    ports:
      - "27017:27017"
    env_file:
      - .env.mongo
    restart: on-failure
    volumes:
      - ./mongo-data:/data/db

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    restart: on-failure
    volumes:
      - ./client:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
